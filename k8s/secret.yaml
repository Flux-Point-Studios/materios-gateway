apiVersion: v1
kind: Secret
metadata:
  name: materios-gateway-secret
  namespace: materios
type: Opaque
# IMPORTANT: Populate via SOPS, sealed-secrets, or `kubectl create secret` at deploy time.
# Do NOT commit the actual base64-encoded values.
#
#   kubectl create secret generic materios-gateway-secret \
#     --from-literal=BLOB_GATEWAY_API_KEY=$(openssl rand -hex 32) \
#     --namespace materios
#
stringData:
  BLOB_GATEWAY_API_KEY: __REPLACE_ME_AT_DEPLOY_TIME__
